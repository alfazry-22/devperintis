<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tic Tac Toe Online</title>
    <style>
        /* --- CSS STYLE TETAP SAMA PERSIS --- */
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { min-height: 100vh; margin: 0; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); display: flex; justify-content: center; align-items: center; padding: 16px; }
        .game-container { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 32px; padding: 24px; max-width: 450px; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); }
        h2 { color: #e94560; text-align: center; margin: 0 0 16px 0; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.3); font-size: 1.6rem; }
        .status-area { background: rgba(0, 0, 0, 0.3); border-radius: 50px; padding: 16px 20px; margin-bottom: 24px; text-align: center; border-left: 4px solid #e94560; }
        #statusText { color: white; font-size: 1.1rem; font-weight: 500; margin-bottom: 8px; }
        #roomInfo { color: #a0a0c0; font-size: 0.8rem; word-break: break-all; }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
        .cell { aspect-ratio: 1 / 1; background: rgba(255, 255, 255, 0.08); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 4rem; font-weight: 700; color: white; text-shadow: 0 4px 8px rgba(0,0,0,0.3); cursor: pointer; transition: all 0.2s; border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 8px 0 rgba(0,0,0,0.2); user-select: none; }
        .cell:active { transform: scale(0.95); }
        .cell.X { color: #00d2ff; text-shadow: 0 0 20px #00d2ff80; }
        .cell.O { color: #ff6b6b; text-shadow: 0 0 20px #ff6b6b80; }
        .cell.disabled { opacity: 0.5; pointer-events: none; }
        .join-box { display: flex; gap: 10px; margin-bottom: 16px; }
        input { flex: 1; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); padding: 14px 18px; border-radius: 40px; color: white; font-size: 1rem; outline: none; }
        input::placeholder { color: #aaaacc; }
        button { background: #e94560; color: white; border: none; padding: 14px 24px; border-radius: 40px; font-weight: 600; font-size: 1rem; cursor: pointer; box-shadow: 0 6px 0 #b0304a; transition: 0.1s; border: 1px solid #ff7b8b; letter-spacing: 0.5px; }
        button:active { transform: translateY(4px); box-shadow: 0 2px 0 #b0304a; }
        button.secondary { background: #0f3460; box-shadow: 0 6px 0 #0a2440; border-color: #2a4a7a; }
        .action-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .copy-btn { background: #533483; box-shadow: 0 6px 0 #3b1f63; }
        .footer { color: #7a7a9a; text-align: center; margin-top: 20px; font-size: 0.8rem; }
    </style>
    <!-- PeerJS Library -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
<div class="game-container">
    <h2>TIC TAC TOE ONLINE</h2>
    
    <div class="status-area">
        <div id="statusText">Menghubungkan ke server...</div>
        <div id="roomInfo"></div>
    </div>

    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <div class="join-box">
        <input type="text" id="remoteIdInput" placeholder="Masukkan ID teman">
        <button id="connectBtn">Join</button>
    </div>
    
    <div class="action-buttons">
        <button id="copyIdBtn" class="secondary copy-btn">Salin ID Saya</button>
        <button id="resetBtn" class="secondary">Game Baru</button>
    </div>
    
    <div class="footer">
        Koneksi P2P langsung via PeerJS
    </div>
</div>

<script>
    (function(){
        const boardEls = document.querySelectorAll('.cell');
        const statusText = document.getElementById('statusText');
        const roomInfo = document.getElementById('roomInfo');
        
        let peer = null;
        let conn = null;
        let myId = '';
        let mySymbol = '';
        let myTurn = false;
        let gameActive = false;
        let board = ['', '', '', '', '', '', '', '', ''];
        
        const winningCombos = [
            [0,1,2], [3,4,5], [6,7,8],
            [0,3,6], [1,4,7], [2,5,8],
            [0,4,8], [2,4,6]
        ];

        // DAFTAR SERVER SINYAL CADANGAN (FALLBACK)
        const peerServers = [
            { host: '0.peerjs.com', port: 443, secure: true }, // Server utama
            { host: 'peerjs-server.vercel.app', port: 443, secure: true }, // Cadangan 1
            { host: 'peerjs.herokuapp.com', port: 443, secure: true } // Cadangan 2 (terkadang mati, tapi bisa dicoba)
        ];
        let currentServerIndex = 0;

        function initPeer() {
            const serverConfig = peerServers[currentServerIndex];
            statusText.innerText = 'Menghubungkan ke server ' + serverConfig.host + '...';
            
            try {
                peer = new Peer({
                    host: serverConfig.host,
                    port: serverConfig.port,
                    secure: serverConfig.secure,
                    debug: 2 // Log level 2 untuk melihat error detail
                });
            } catch (e) {
                console.error("Gagal inisialisasi Peer", e);
                tryNextServer();
                return;
            }
            
            peer.on('open', (id) => {
                myId = id;
                roomInfo.innerText = 'ID Kamu: ' + id;
                statusText.innerText = 'Menunggu teman join...';
                console.log('Terhubung ke server sinyal:', serverConfig.host);
            });
            
            peer.on('connection', (connection) => {
                if (conn) {
                    connection.close();
                    alert('Sudah ada koneksi aktif');
                    return;
                }
                conn = connection;
                setupConnection();
                
                mySymbol = 'O';
                myTurn = false;
                gameActive = true;
                statusText.innerText = 'Terhubung. Kamu = O (Giliran lawan)';
                updateBoardUI();
            });
            
            peer.on('error', (err) => {
                console.error('Peer Error:', err.type, err);
                
                if (err.type === 'network' || err.type === 'server-error' || err.type === 'socket-error' || err.type === 'socket-closed') {
                    statusText.innerText = 'Error: Gagal terhubung ke server sinyal. Mencoba server lain...';
                    tryNextServer();
                } else if (err.type === 'peer-unavailable') {
                    statusText.innerText = 'Error: ID teman tidak ditemukan. Pastikan teman sudah online.';
                } else {
                    statusText.innerText = 'Error: ' + err.type;
                }
            });
            
            peer.on('disconnected', () => {
                statusText.innerText = 'Terputus dari server. Mencoba menyambung ulang...';
                setTimeout(() => {
                    if (peer) peer.reconnect();
                }, 2000);
            });
        }

        function tryNextServer() {
            currentServerIndex++;
            if (currentServerIndex < peerServers.length) {
                console.log('Mencoba server berikutnya:', peerServers[currentServerIndex].host);
                if (peer) peer.destroy();
                initPeer();
            } else {
                statusText.innerText = 'Error: Semua server sinyal gagal. Periksa koneksi internet.';
                roomInfo.innerText = 'Tidak dapat terhubung ke server PeerJS';
            }
        }

        function setupConnection() {
            conn.on('open', () => {
                console.log('Koneksi data dengan lawan terbuka');
            });
            
            conn.on('data', (data) => {
                handleMessage(data);
            });
            
            conn.on('close', () => {
                gameActive = false;
                myTurn = false;
                statusText.innerText = 'Lawan terputus';
                conn = null;
                mySymbol = '';
                updateBoardUI();
            });
            
            conn.on('error', (err) => {
                console.error('Connection error:', err);
                statusText.innerText = 'Error pada koneksi data';
            });
        }

        // --- SISA KODE GAME TETAP SAMA PERSIS (handleMessage, connectToPeer, dll) ---
        function handleMessage(msg) {
            if (msg.type === 'MOVE') {
                const { index, symbol } = msg;
                if (board[index] === '' && gameActive) {
                    board[index] = symbol;
                    updateBoardUI();
                    
                    const winner = checkWinner();
                    if (winner) {
                        statusText.innerText = winner === 'X' ? 'X Menang!' : 'O Menang!';
                        gameActive = false;
                        myTurn = false;
                    } else if (!board.includes('')) {
                        statusText.innerText = 'Seri!';
                        gameActive = false;
                        myTurn = false;
                    } else {
                        myTurn = true;
                        statusText.innerText = 'Giliranmu (' + mySymbol + ')';
                    }
                }
            } else if (msg.type === 'RESET') {
                resetBoard();
                if (mySymbol === 'X') {
                    myTurn = true;
                    statusText.innerText = 'Giliranmu (X)';
                } else {
                    myTurn = false;
                    statusText.innerText = 'Menunggu giliran X...';
                }
                gameActive = true;
                updateBoardUI();
            } else if (msg.type === 'SYMBOL') {
                if (!mySymbol) {
                    mySymbol = 'O';
                    myTurn = false;
                    gameActive = true;
                    statusText.innerText = 'Terhubung. Kamu = O (Giliran lawan)';
                }
            }
        }

        function connectToPeer(remoteId) {
            if (!peer || remoteId === myId) {
                alert('ID tidak valid atau itu ID kamu sendiri');
                return;
            }
            
            if (conn) {
                conn.close();
            }
            
            statusText.innerText = 'Menghubungkan ke ' + remoteId + '...';
            conn = peer.connect(remoteId, { reliable: true });
            setupConnection();
            
            mySymbol = 'X';
            myTurn = true;
            gameActive = true;
            
            conn.on('open', () => {
                statusText.innerText = 'Terhubung. Kamu = X (Giliranmu)';
                conn.send({ type: 'SYMBOL', symbol: 'X' });
                updateBoardUI();
            });
        }

        function updateBoardUI() {
            boardEls.forEach((cell, i) => {
                cell.textContent = board[i];
                cell.className = 'cell';
                if (board[i] === 'X') cell.classList.add('X');
                if (board[i] === 'O') cell.classList.add('O');
                
                if (!gameActive || !myTurn || board[i] !== '') {
                    cell.classList.add('disabled');
                } else {
                    cell.classList.remove('disabled');
                }
            });
        }

        function checkWinner() {
            for (let combo of winningCombos) {
                const [a, b, c] = combo;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    return board[a];
                }
            }
            return null;
        }

        function resetBoard() {
            board = ['', '', '', '', '', '', '', '', ''];
        }

        function handleCellClick(e) {
            const cell = e.target.closest('.cell');
            if (!cell) return;
            
            const index = parseInt(cell.dataset.index);
            
            if (!gameActive || !myTurn || board[index] !== '' || !conn) {
                if (!conn) alert('Belum terhubung dengan lawan');
                return;
            }
            
            board[index] = mySymbol;
            updateBoardUI();
            
            conn.send({ type: 'MOVE', index: index, symbol: mySymbol });
            
            const winner = checkWinner();
            if (winner) {
                statusText.innerText = winner === mySymbol ? 'Kamu Menang!' : 'Kamu Kalah!';
                gameActive = false;
                myTurn = false;
            } else if (!board.includes('')) {
                statusText.innerText = 'Seri!';
                gameActive = false;
                myTurn = false;
            } else {
                myTurn = false;
                statusText.innerText = 'Menunggu lawan...';
            }
            
            updateBoardUI();
        }

        function requestReset() {
            if (!conn) {
                resetBoard();
                gameActive = false;
                myTurn = false;
                updateBoardUI();
                statusText.innerText = myId ? 'Menunggu teman join...' : 'Menghubungkan ke server...';
                return;
            }
            
            resetBoard();
            gameActive = true;
            
            if (mySymbol === 'X') {
                myTurn = true;
                statusText.innerText = 'Giliranmu (X)';
            } else {
                myTurn = false;
                statusText.innerText = 'Menunggu giliran X...';
            }
            
            conn.send({ type: 'RESET' });
            updateBoardUI();
        }

        function copyMyId() {
            if (!myId) {
                alert('Tunggu sebentar, ID belum siap');
                return;
            }
            navigator.clipboard?.writeText(myId).then(() => {
                alert('ID berhasil disalin!');
            }).catch(() => {
                prompt('Salin manual ID ini:', myId);
            });
        }

        document.getElementById('board').addEventListener('click', handleCellClick);
        document.getElementById('connectBtn').addEventListener('click', () => {
            const remoteId = document.getElementById('remoteIdInput').value.trim();
            if (remoteId) connectToPeer(remoteId);
        });
        document.getElementById('copyIdBtn').addEventListener('click', copyMyId);
        document.getElementById('resetBtn').addEventListener('click', requestReset);
        
        initPeer();
        updateBoardUI();
        
        window.addEventListener('beforeunload', () => {
            if (conn) conn.close();
            if (peer) peer.destroy();
        });
    })();
</script>
</body>
</html>
